# ============================================
# DATABASE CONFIGURATION
# ============================================

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3336/JobEra09
spring.datasource.username=root
spring.datasource.password=Satej@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# SERVER CONFIGURATION
# ============================================

server.port=8081
server.servlet.context-path=/

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true

# File storage location
file.upload-dir=uploads/

# ============================================
# SPRING SECURITY (COMPLETELY DISABLE)
# ============================================

# Completely disable Spring Security
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ============================================
# LOGGING CONFIGURATION
# ============================================

logging.level.com.jobera=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.security=OFF
logging.level.org.springframework.transaction=DEBUG

# ============================================
# SPRING BOOT SPECIFIC
# ============================================

spring.main.banner-mode=console
spring.main.allow-bean-definition-overriding=true
spring.web.resources.add-mappings=true

# DevTools configuration
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ============================================
# DATABASE CONNECTION POOL
# ============================================

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3

# ============================================
# ERROR HANDLING
# ============================================

server.error.include-stacktrace=never
server.error.include-message=always
server.error.whitelabel.enabled=true

# ============================================
# TRANSACTION MANAGEMENT (FIXED)
# ============================================

# Transaction timeout in seconds
spring.transaction.default-timeout=300

# CRITICAL: Set to false to prevent rollback on commit failure
# This allows individual file uploads to fail without rolling back the entire batch
spring.transaction.rollback-on-commit-failure=false

# ============================================
# ADDITIONAL SETTINGS FOR RESUME PARSING
# ============================================

# Increase timeout for large file processing
spring.mvc.async.request-timeout=600000

# Allow larger headers if needed
server.max-http-header-size=100KB